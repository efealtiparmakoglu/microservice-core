apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservice-core-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: microservice-core.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: microservice-core-service
            port:
              number: 80
